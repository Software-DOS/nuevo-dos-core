<div class="cap-row">
    <div class="cap-info">
      <h3 class="cap-title">{{ titulo }}</h3>
      <p class="cap-description">{{ descripcion }}</p>
    </div>
    <div class="cap-meta">
      <span class="cap-duration">{{ duracion }}</span>
      <span class="cap-fecha">{{ fecha }}</span>
      <span class="cap-estado">{{ estado }}</span>
      <a class="cap-action" [routerLink]="ruta">{{ textoBoton }}</a>
    </div>
</div>
